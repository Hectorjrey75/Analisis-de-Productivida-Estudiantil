# Configuración del proyecto
project:
  name: "student-performance-analysis"
  version: "1.0.0"
  description: "Análisis de rendimiento estudiantil y hábitos digitales"

data:
  
  raw_path: "data/raw/student_productivity_distraction_dataset_20000.csv"
  processed_path: "data/processed/"
  external_path: "data/external/"
  
  required_columns:
    - student_id
    - productivity_score
    - final_grade
    - study_hours_per_day
    - phone_usage_hours
    - social_media_hours
    - youtube_hours
    - gaming_hours
    - sleep_hours
    - exercise_minutes
    - attendance_percentage
    - assignments_completed
  
  imputation:
    strategy: "median"  # mean, median, mode, forward_fill, drop
  
features:
  digital:
    - phone_usage_hours
    - social_media_usage
    - youtube_usage
    - gaming_hours
  academic:
    - study_hours
    - attendance_percentage
    - assignments_completed
    - final_grade
  lifestyle:
    - sleep_hours
    - exercise_minutes
    - coffee_intake
    - stress_level
  target:
    - productivity_score
    - final_grade

preprocessing:
  normalization:
    method: "standard"  # standard, minmax
    
  encoding:
    method: "onehot"  # onehot, label
    
  outliers:
    strategy: "clip"  # clip, remove, winsorize
    threshold: 3.0

correlation:
  method: "pearson"  # pearson, spearman, kendall
  significance_level: 0.95
  multicollinearity_threshold: 0.8

models:
  types:
    - linear_regression
    - random_forest
    - gradient_boosting
  
  regression:
    random_forest:
      n_estimators: 100
      max_depth: 10
      random_state: 42
    gradient_boosting:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      random_state: 42
    linear_regression: {}
  
  classification:
    random_forest:
      n_estimators: 100
      max_depth: 10
      random_state: 42
  
  production_threshold:
    r_squared: 0.7

training:
  test_size: 0.15
  validation_size: 0.15
  random_state: 42
  cv_folds: 5

recommendations:
  n_recommendations: 3
  optimal_ranges:
    study_hours_per_day: [6.0, 9.0]
    sleep_hours: [7.0, 9.0]
    phone_usage_hours: [0.0, 3.0]
    social_media_hours: [0.0, 2.0]
    exercise_minutes: [30, 60]

export:
  model_formats:
    - pickle
    - onnx
  include_metadata: true
  compute_checksums: true

visualization:
  style: "seaborn-v0_8-darkgrid"
  palette: "husl"
  figsize: [12, 8]
  dpi: 300